<div class="header-desktop" [ngStyle]="{'background-color': backgroundColor}">
    <span>
        <a [ngStyle]="{'color': textColor}" routerLink="/" (click)="scrollTo('qui')">Qui sommes nous?</a>
        <a [ngStyle]="{'color': textColor}" routerLink="/" (click)="scrollTo('activites')">Nos activités</a>
    </span>
    <span>
        <img [src]=logo alt="TrissClean Logo">
    </span>
    <span>
        <a [ngStyle]="{'color': textColor}" routerLink="/worker">Nos intervenants</a>
        <a [ngStyle]="{'color': textColor}" class="buttonContact" [ngStyle]="{'color': backgroundColor, 'background-color': textColor}" routerLink="/contact">Contactez nous!</a>
    </span>
</div>
<div class="header-mobile" [ngStyle]="{'background-color': backgroundColor}">
    <span>
        <img [src]=logo alt="TrissClean Logo">
    </span>
    <span>
        <a [ngStyle]="{'color': textColor}" routerLink="/" (click)="scrollTo('qui')">Qui sommes nous?</a>
        <a [ngStyle]="{'color': textColor}" routerLink="/" (click)="scrollTo('activites')">Nos activités</a>
    </span>
    <span>
        <a [ngStyle]="{'color': textColor}" routerLink="/worker">Nos intervenants</a>
        <a [ngStyle]="{'color': textColor}" class="buttonContact" [ngStyle]="{'color': backgroundColor, 'background-color': textColor}" routerLink="/contact">Contactez nous!</a>
    </span>
</div>
